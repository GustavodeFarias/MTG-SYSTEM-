<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3b82f6">
  <title>MTG SYSTEM — Sem Conexão</title>
  <link rel="stylesheet" href="app-bundle.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .offline-wrap { text-align:center; padding:40px 24px; max-width:400px; }
    .offline-icon { width:80px; height:80px; margin:0 auto 24px; background:var(--brand-subtle); border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .offline-icon svg { width:40px; height:40px; stroke:var(--brand-400); fill:none; stroke-width:1.5; stroke-linecap:round; }
    .offline-title { font-family:var(--font-h); font-size:28px; font-weight:800; color:var(--text-primary); margin-bottom:8px; letter-spacing:-0.5px; }
    .offline-msg { font-size:14px; color:var(--text-muted); line-height:1.7; margin-bottom:28px; }
    .offline-tips { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:20px; text-align:left; margin-bottom:24px; }
    .offline-tips h3 { font-size:13px; font-weight:700; color:var(--text-secondary); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
    .offline-tips li { font-size:13px; color:var(--text-muted); padding:4px 0; padding-left:16px; position:relative; }
    .offline-tips li::before { content:'•'; position:absolute; left:0; color:var(--brand-400); }
  </style>
</head>
<body>
<div class="offline-wrap">
  <div class="offline-icon">
    <svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/><path d="M5 12.55a10.94 10.94 0 015.17-2.39"/><path d="M10.71 5.05A16 16 0 0122.56 9"/><path d="M1.42 9a15.91 15.91 0 014.7-2.88"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
  </div>
  <div class="offline-title">Sem conexão</div>
  <div class="offline-msg">Você está offline. O MTG SYSTEM precisa de internet para sincronizar os dados com o servidor.</div>
  <div class="offline-tips">
    <h3>O que você pode fazer</h3>
    <ul>
      <li>Verificar sua conexão Wi-Fi ou dados móveis</li>
      <li>Tentar novamente em alguns instantes</li>
      <li>Dados em cache podem estar disponíveis ao reconectar</li>
    </ul>
  </div>
  <button class="btn btn-primary" onclick="window.location.reload()" style="width:100%">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
    Tentar novamente
  </button>
</div>
<script>
  document.documentElement.setAttribute('data-theme', localStorage.getItem('mtg_theme') || 'dark');
  window.addEventListener('online', () => window.location.href = '/');
</script>
</body>
</html>
